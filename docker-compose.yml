version: '3.8'

services:
  backend:
    build: ./backend
    container_name: placement-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&trustServerCertificate=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      ANALYTICS_BASE_URL: http://analytics:8001
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      - analytics

  analytics:
    build: ./analytics
    container_name: placement-analytics
    restart: always
    ports:
      - "8001:8001"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

  frontend:
    build: ./frontend
    container_name: placement-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
